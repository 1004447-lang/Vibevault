
<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link rel="stylesheet" href="css/styles.css">
<script src="js/app.js"></script>
</head>
<body>

<header>
<a href="/"><img src="images/logo.png" class="logo"></a>
</header>

<div class="container">

<h1>Checkout</h1>

<form id="checkout" onsubmit="event.preventDefault(); checkout();">

<input name="name" placeholder="Name" required><br><br>
<input name="email" type="email" placeholder="Email" required><br><br>
<input name="phone" placeholder="Phone Number" required><br><br>
<input name="address" placeholder="Address" required><br><br>
<input name="country" placeholder="Country" required><br><br>
<input name="postal" placeholder="Postal Code" required><br><br>

<button type="submit">Proceed to Payment</button>

</form>

</div>

</body>
</html>
